services:
  - type: web
    name: pos-web
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: ./entrypoint.sh
    envVars:
      - key: SERVICE_TYPE
        value: web
      - key: DATABASE_URL
        fromDatabase:
          name: pos-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: pos-redis
          property: connectionString

  - type: worker
    name: pos-worker
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: ./entrypoint.sh
    envVars:
      - key: SERVICE_TYPE
        value: worker
      - key: DATABASE_URL
        fromDatabase:
          name: pos-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: pos-redis
          property: connectionString

databases:
  - name: pos-db
    plan: free
    ipAllowList: []

  - name: pos-redis
    type: redis
    plan: free
    ipAllowList: []
